name: Build

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
        default: snapshot
        description: |
          the mode to use. either `snapshot` or `release`. Will affect effective version, as well
          as target-oci-registry.

jobs:
  prepare:
    uses: gardener/cc-utils/.github/workflows/prepare.yaml@v1
    with:
      mode: ${{ inputs.mode }}
      version-commit-callback-action-path: .github/actions/prepare-release
    permissions:
      id-token: write

  oci-images:
    name: Build OCI-Images
    needs:
      - prepare
      - verify
    permissions:
      contents: read
      packages: write
      id-token: write
    secrets: inherit
    uses: gardener/cc-utils/.github/workflows/oci-ocm.yaml@v1
    strategy:
      matrix:
        args:
          - name: gardener-discovery-server
            target: gardener-discovery-server
            oci-repository: gardener/gardener-discovery-server
            ocm-labels:
              name: gardener.cloud/cve-categorisation
              value:
                network_exposure:
                authentication_enforced:
                user_interaction:
                confidentiality_requirement:
                integrity_requirement:
                availability_requirement:
    with:
      name: ${{ matrix.args.name }}
      version: ${{ needs.prepare.outputs.version }}
      oci-registry: ${{ needs.prepare.outputs.oci-registry }}
      oci-repository: ${{ matrix.args.oci-repository }}
      oci-platforms: linux/amd64,linux/arm64
      ocm-labels: ${{ toJSON(matrix.args.ocm-labels) }}
      target: ${{ matrix.args.target }}
      extra-tags: latest

  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: gardener/cc-utils/.github/actions/trusted-checkout@v1
      - name: run-verify
        run: |
          set -eu
          mkdir /tmp/blobs.d
          .ci/verify |& tee /tmp/blobs.d/verify-log.txt
          # verify calls `make sast-report`, which generates `gosec-report.sarif`
          tar czf /tmp/blobs.d/gosec-report.tar.gz gosec-report.sarif
          tar czf /tmp/blobs.d/verify-log.tar.gz -C /tmp/blobs.d verify-log.txt
      - name: add-sast-report-to-component-descriptor
        uses: gardener/cc-utils/.github/actions/export-ocm-fragments@v1
        with:
          blobs-directory: /tmp/blobs.d
          ocm-resources: |
            - name: gosec-report
              relation: local
              access:
                type: localBlob
                localReference: gosec-report.tar.gz
              labels:
                - name: gardener.cloud/purposes
                  value:
                    - lint
                    - sast
                    - gosec
                - name: gardener.cloud/comment
                  value: |
                    we use gosec (linter) for SAST scans
                    see: https://github.com/securego/gosec
                    Enabled by https://github.com/gardener/gardener-discovery-server/pull/70
            - name: test-results
              relation: local
              access:
                type: localBlob
                localReference: verify-log.tar.gz
              labels:
                - name: gardener.cloud/purposes
                  value:
                    - test

  helmcharts:
    name: Build Helmcharts
    needs:
      - prepare
      - oci-images
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: gardener/cc-utils/.github/workflows/helmchart-ocm.yaml@v1
    strategy:
      matrix:
        args:
          - name: gardener-discovery-server
            dir: charts/discovery-server
            oci-repository: charts/gardener/gardener-discovery-server
            ocm-mappings:
              - ref: ocm-resource:gardener-discovery-server.repository
                attribute: runtime.image.repository
              - ref: ocm-resource:gardener-discovery-server.tag
                attribute: runtime.image.tag
    with:
      name: ${{ matrix.args.name }}
      dir: ${{ matrix.args.dir }}
      oci-registry: ${{ needs.prepare.outputs.oci-registry }}
      oci-repository: ${{ matrix.args.oci-repository }}
      ocm-mappings: ${{ toJSON(matrix.args.ocm-mappings) }}

  helmcharts-summary:
    name: Helm Charts Summary
    runs-on: ubuntu-latest
    needs:
    - helmcharts
    if: ${{ always() }}  # Ensures this job runs even if the matrix partially fails
    permissions:
      contents: read
    steps:
      - name: Fail if Helm Charts matrix failed
        if: ${{ needs.helmcharts.result != 'success' }}
        run: exit 1
